name: Bug report
description: Meld een bug in SMP Essentials
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Mod versie
      placeholder: "bijv. 1.0.0"
    validations:
      required: true

  - type: input
    id: mc_version
    attributes:
      label: Minecraft versie
      placeholder: "bijv. 26.1.2"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Wat gaat er mis?
      description: Beschrijf het probleem zo duidelijk mogelijk.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Stappen om te reproduceren
      placeholder: |
        1. Ga naar ...
        2. Doe ...
        3. Zie fout
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Verwacht gedrag
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / crash report
      description: Plak hier de relevante logs (latest.log of crash report)
      render: text
